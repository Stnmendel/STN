<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AetherAI Chat</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>AetherAI</h1>
    <p>Logged in as {{ user }} - <a href="/logout">Logout</a></p>
    <div id="chat-box">
        {% for item in history %}
            <div class="user">{{ item.user }}</div>
            <div class="bot">{{ item.bot }}</div>
        {% endfor %}
    </div>
    <input type="text" id="user-input" placeholder="Type your message" />
    <button onclick="sendMessage()">Send</button>
    <script>
        async function sendMessage() {
            const inputEl = document.getElementById('user-input');
            const message = inputEl.value;
            inputEl.value = '';
            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message})
            });
            const data = await res.json();
            const box = document.getElementById('chat-box');
            if (data.error) {
                box.innerHTML += '<div class="error">'+data.error+'</div>';
            } else {
                box.innerHTML += '<div class="user">'+message+'</div>';
                box.innerHTML += '<div class="bot">'+data.response+'</div>';
            }
        }
    </script>
</body>
</html>
