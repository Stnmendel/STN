{% extends 'base.html' %}
{% block content %}
<div class="trending">
    <h2>Trendler</h2>
    <div class="posts">
    {% for post in trending %}
        <div class="post-item">
            <a href="/post/{{ post.id }}">
                <img src="{{ post.image }}" alt="{{ post.title }}">
                <h3>{{ post.title }}</h3>
            </a>
        </div>
    {% endfor %}
    </div>
</div>

<h2>Tüm Yazılar</h2>
<div class="posts">
{% for post in posts %}
    <div class="post-item">
        <a href="/post/{{ post.id }}">
            <img src="{{ post.image }}" alt="{{ post.title }}">
            <h3>{{ post.title }}</h3>
        </a>
    </div>
{% endfor %}
</div>
{% endblock %}
